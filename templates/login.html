{% extends "base.html" %}

{% block title %}Вход — Chart Detective{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="ti ti-radar-2"></i>
                <span>Chart Detective</span>
            </div>
            <h1 class="auth-title">Вход</h1>
            <p class="auth-subtitle">Войдите в свой аккаунт</p>

            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input type="text" id="login" name="login" class="form-control"
                           required autocomplete="username" placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" class="form-control"
                           required autocomplete="current-password" placeholder="Введите пароль">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="ti ti-login-2"></i>
                    <span>Войти</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
