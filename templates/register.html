{% extends "base.html" %}

{% block title %}Регистрация — Chart Detective{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="ti ti-radar-2"></i>
                <span>Chart Detective</span>
            </div>
            <h1 class="auth-title">Регистрация</h1>
            <p class="auth-subtitle">Создайте аккаунт для сохранения результатов</p>

            <form method="POST" action="{{ url_for('register') }}" class="auth-form">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input type="text" id="login" name="login" class="form-control"
                           required autocomplete="username" placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label for="nickname">Никнейм</label>
                    <input type="text" id="nickname" name="nickname" class="form-control"
                           required autocomplete="nickname" placeholder="Ваше отображаемое имя">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" class="form-control"
                           required autocomplete="new-password" placeholder="Минимум 6 символов" minlength="6">
                </div>
                <div class="form-group">
                    <label for="password_repeat">Повторите пароль</label>
                    <input type="password" id="password_repeat" name="password_repeat" class="form-control"
                           required autocomplete="new-password" placeholder="Повторите пароль" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="ti ti-user-plus"></i>
                    <span>Зарегистрироваться</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
